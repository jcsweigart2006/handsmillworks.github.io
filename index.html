<html>
<head>
<title>H and S Millworks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style type="text/css">body{margin:40px auto;max-width:650px;line-height:1.6;font-size:18px;color:#444;padding:0 10px}h1,h2,h3{line-height:1.2}
h1 {text-align: center;}  
p {text-align: center;} 
h2 {text-align: center;}
.container {
  padding: 2rem;
}
.slider-wrapper {
  position: relative;
  max-width: 48rem;
  margin: 0 auto;
}
.slider {
  display: flex;
  aspect-ratio: 16 / 9;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  box-shadow: 0 1.5rem 3rem -0.75rem hsla(0, 0%, 0%, 0.25);
  border-radius: 0.5rem;
}
.slider img {
  flex: 1 0 %100;
  scroll-snap-align: start;
  object-fit: cover;
}
.slider-nav {
  display: flex;
  column-gap: 1rem;
  position: absolute;
  bottom: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}
.slider-nav a {
  width: 0.5rem;
  height: 0.5rem;
  border-radious: 50%;
  background-color: #fff;
  opacity: 0.75;
  transition: opacity ease 250ms;
}
.slider-nav a:hover {
  opacity: 1;
}
</style>
</head>
<body>
<h2>Our Mission Statement</h2>
<p>We combine innovative design with unrivaled craftsmanship to deliver the finest millworks products in the industry.</p>
<h2>Contact Us</h2>
<p>717-254-3634</p>
<p>handsmillworks@gmail.com</p>

      <img id="slide-2" src="1000006940.jpg" />
      <img id="slide-3" src="1000006947.jpg" />
      <img id="slide-4" src="1000007391.jpg" />
      <img id="slide-5" src="1000007438.jpg" />
      <img id="slide-6" src="1000007440.jpg" />
    </div>
    <div class="slider-nav">
      <a href="#slide-1"></a>
      <a href="#slide-2"></a>
      <a href="#slide-3"></a>
      <a href="#slide-4"></a>
      <a href="#slide-5"></a>
      <a href="#slide-6"></a>
    </div>
  </div>
</section>
</body>
</html>
